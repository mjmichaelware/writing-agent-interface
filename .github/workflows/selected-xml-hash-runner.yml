name: Selected XML hash runner

on:
  workflow_dispatch:
    inputs:
      limit_docs:
        description: Optional selected XML document limit.
        required: false
        default: "1"
      limit:
        description: Optional selected XML window limit.
        required: false
        default: "20"
      batch_size:
        description: Selected XML batch size.
        required: false
        default: "1"
      resume_existing:
        description: Resume from existing checkpoint state.
        required: false
        default: "false"
      provider:
        description: Semantic provider.
        required: false
        default: ollama_actions
      model:
        description: Semantic model.
        required: false
        default: llama3.2:1b

permissions:
  contents: read

jobs:
  selected-xml-hash-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}

      RESUME_EXISTING: ${{ inputs.resume_existing || 'false' }}
      ALLOW_FAILURE_CONTINUE: "true"
      SEMANTIC_PROVIDER: ${{ inputs.provider || 'ollama_actions' }}
      SEMANTIC_MODEL: ${{ inputs.model || 'llama3.2:1b' }}

      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: ${{ inputs.model || 'llama3.2:1b' }}
      OLLAMA_NUM_CTX: "2048"
      OLLAMA_CONTEXT_CHARS: "4000"
      OLLAMA_TIMEOUT_MS: "300000"
      OLLAMA_KEEP_ALIVE: 5m

      SOFT_STOP_MINUTES: "10"
      MAX_TASK_RETRIES: "2"
      MIN_SEMANTIC_WINDOW_WORDS: "4"
      MIN_SEMANTIC_WINDOW_CHARS: "20"

      SELECTED_XML_SCRIPT: scripts/semantic/xml-selected-meaning-span-rehash.mjs
      SELECTED_XML_LIMIT_DOCS: ${{ inputs.limit_docs || '1' }}
      SELECTED_XML_LIMIT: ${{ inputs.limit || '20' }}
      SELECTED_XML_BATCH_SIZE: ${{ inputs.batch_size || '1' }}
      SELECTED_XML_RUN_LOG: docs/forensics/audits/selected-xml-hash-runner.log
      SELECTED_XML_RESULT_SIGNALS: docs/forensics/audits/selected-xml-result-signals.json
      SELECTED_XML_OLLAMA_LOG: docs/forensics/audits/ollama-server.log
      SELECTED_XML_OLLAMA_SMOKE: docs/forensics/audits/ollama-smoke.json
      SELECTED_XML_OLLAMA_SMOKE_TEXT: docs/forensics/audits/ollama-smoke.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Ollama model data
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ runner.os }}-llama3.2-1b
          restore-keys: |
            ollama-${{ runner.os }}-

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Prepare audit directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p docs/forensics/audits/xml-selected-meaning-span-rehash-runs
          mkdir -p docs/forensics/audits

      - name: Validate selected XML driver syntax
        shell: bash
        run: |
          set -euo pipefail

          test -f "$SELECTED_XML_SCRIPT"
          node --check "$SELECTED_XML_SCRIPT"

      - name: Verify Supabase configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "::error::SUPABASE_URL is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF is not set."
            exit 1
          fi

      - name: Install Ollama on Ubuntu
        shell: bash
        run: |
          set -euo pipefail

          dump_ollama_log() {
            if [ -f "$SELECTED_XML_OLLAMA_LOG" ]; then
              echo "===== Ollama log tail ====="
              tail -n 200 "$SELECTED_XML_OLLAMA_LOG" || true
            fi
          }
          trap 'status=$?; if [ "$status" -ne 0 ]; then dump_ollama_log; fi' EXIT

          curl -fsSL https://ollama.com/install.sh | sh

          mkdir -p docs/forensics/audits
          : > "$SELECTED_XML_OLLAMA_LOG"

          nohup ollama serve > "$SELECTED_XML_OLLAMA_LOG" 2>&1 &
          echo "ollama_pid=$!"

          ready="false"
          for _ in $(seq 1 180); do
            if curl -fsS "$OLLAMA_BASE_URL/api/tags" > /dev/null 2>&1; then
              ready="true"
              break
            fi
            sleep 1
          done

          if [ "$ready" != "true" ]; then
            echo "::error::Ollama did not become ready within 180 seconds."
            exit 1
          fi

          ollama pull "$OLLAMA_MODEL"
          curl -fsS "$OLLAMA_BASE_URL/api/tags" | tee docs/forensics/audits/ollama-tags.json > /dev/null

          smoke_response="$(
            curl -fsS "$OLLAMA_BASE_URL/api/generate" \
              -H 'Content-Type: application/json' \
              -d "{\"model\":\"$OLLAMA_MODEL\",\"prompt\":\"Reply with exactly OK.\",\"stream\":false}"
          )"
          printf '%s\n' "$smoke_response" | tee "$SELECTED_XML_OLLAMA_SMOKE" > /dev/null

          smoke_text="$(printf '%s' "$smoke_response" | jq -r '.response // empty')"
          printf '%s\n' "$smoke_text" | tee "$SELECTED_XML_OLLAMA_SMOKE_TEXT" > /dev/null

          if [ -z "$smoke_text" ]; then
            echo "::error::Ollama smoke test returned no response text."
            exit 1
          fi

          if ! printf '%s' "$smoke_text" | grep -q 'OK'; then
            echo "::error::Ollama smoke test did not return OK."
            exit 1
          fi

      - name: Run selected XML hash proof
        shell: bash
        run: |
          set -euo pipefail

          dump_ollama_log() {
            if [ -f "$SELECTED_XML_OLLAMA_LOG" ]; then
              echo "===== Ollama log tail ====="
              tail -n 200 "$SELECTED_XML_OLLAMA_LOG" || true
            fi
          }

          ensure_ollama_ready() {
            if curl -fsS "$OLLAMA_BASE_URL/api/tags" > /dev/null 2>&1; then
              return 0
            fi

            echo "===== Ollama not reachable before proof; restarting ====="
            mkdir -p docs/forensics/audits
            : > "$SELECTED_XML_OLLAMA_LOG"

            nohup ollama serve > "$SELECTED_XML_OLLAMA_LOG" 2>&1 &
            echo "ollama_pid=$!"

            ready="false"
            for _ in $(seq 1 180); do
              if curl -fsS "$OLLAMA_BASE_URL/api/tags" > /dev/null 2>&1; then
                ready="true"
                break
              fi
              sleep 1
            done

            if [ "$ready" != "true" ]; then
              echo "::error::Ollama did not become ready within 180 seconds before proof."
              dump_ollama_log
              exit 1
            fi

            ollama pull "$OLLAMA_MODEL"
            curl -fsS "$OLLAMA_BASE_URL/api/tags" | tee docs/forensics/audits/ollama-tags.json > /dev/null

            smoke_response="$(
              curl -fsS "$OLLAMA_BASE_URL/api/generate" \
                -H 'Content-Type: application/json' \
                -d "{\"model\":\"$OLLAMA_MODEL\",\"prompt\":\"Reply with exactly OK.\",\"stream\":false}"
            )"
            printf '%s\n' "$smoke_response" | tee "$SELECTED_XML_OLLAMA_SMOKE" > /dev/null

            smoke_text="$(printf '%s' "$smoke_response" | jq -r '.response // empty')"
            printf '%s\n' "$smoke_text" | tee "$SELECTED_XML_OLLAMA_SMOKE_TEXT" > /dev/null

            if [ -z "$smoke_text" ] || ! printf '%s' "$smoke_text" | grep -q 'OK'; then
              echo "::error::Ollama smoke test failed before proof."
              dump_ollama_log
              exit 1
            fi
          }

          ensure_ollama_ready

          echo "RESULT SIGNALS: starting selected XML hash proof"
          echo "write_mode=true"
          echo "no_ai=false"
          echo "db_adapter=supabase_data_plane"
          echo "management_api_hot_path=false"
          echo "resume_existing=${RESUME_EXISTING}"

          RESUME_EXISTING="${RESUME_EXISTING}" \
          SEMANTIC_PROVIDER="${SEMANTIC_PROVIDER}" \
          SEMANTIC_MODEL="${SEMANTIC_MODEL}" \
          OLLAMA_BASE_URL="${OLLAMA_BASE_URL}" \
          OLLAMA_MODEL="${OLLAMA_MODEL}" \
          OLLAMA_NUM_CTX="${OLLAMA_NUM_CTX}" \
          OLLAMA_CONTEXT_CHARS="${OLLAMA_CONTEXT_CHARS}" \
          OLLAMA_TIMEOUT_MS="${OLLAMA_TIMEOUT_MS}" \
          OLLAMA_KEEP_ALIVE="${OLLAMA_KEEP_ALIVE}" \
          SOFT_STOP_MINUTES="${SOFT_STOP_MINUTES}" \
          MAX_TASK_RETRIES="${MAX_TASK_RETRIES}" \
          MIN_SEMANTIC_WINDOW_WORDS="${MIN_SEMANTIC_WINDOW_WORDS}" \
          MIN_SEMANTIC_WINDOW_CHARS="${MIN_SEMANTIC_WINDOW_CHARS}" \
          ALLOW_FAILURE_CONTINUE="${ALLOW_FAILURE_CONTINUE}" \
          node scripts/semantic/xml-selected-meaning-span-rehash.mjs \
            --write \
            --provider="${SEMANTIC_PROVIDER}" \
            --limit-docs="${SELECTED_XML_LIMIT_DOCS}" \
            --limit="${SELECTED_XML_LIMIT}" \
            --batch-size="${SELECTED_XML_BATCH_SIZE}" \
            --soft-stop-minutes="${SOFT_STOP_MINUTES}" \
            --max-task-retries="${MAX_TASK_RETRIES}" \
            2>&1 | tee "$SELECTED_XML_RUN_LOG"

      - name: Print RESULT SIGNALS
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          latest_summary="$(
            find docs/forensics/audits/xml-selected-meaning-span-rehash-runs \
              -type f \
              -name run-summary.json \
              | sort \
              | tail -n 1 || true
          )"

          if [ -z "${latest_summary:-}" ] || [ ! -f "$latest_summary" ]; then
            echo "RESULT SIGNALS: no run-summary.json found"
            exit 0
          fi

          jq -c '{
            run_id,
            provider,
            canonical_provider,
            provider_model,
            write_mode,
            no_ai,
            db_adapter,
            management_api_hot_path,
            resume_existing,
            semantic_windows_target,
            semantic_windows_attempted,
            semantic_windows,
            meaning_spans,
            total_meaning_spans,
            task_ok,
            task_empty,
            task_failed,
            failed,
            last_error_type,
            last_error_message
          }' "$latest_summary" | tee "$SELECTED_XML_RESULT_SIGNALS"

          echo "RESULT SIGNALS: $SELECTED_XML_RESULT_SIGNALS"
          cat "$SELECTED_XML_RESULT_SIGNALS"

      - name: Upload selected XML hash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selected-xml-hash-runner-artifacts
          if-no-files-found: warn
          path: |
            docs/forensics/audits/selected-xml-hash-runner.log
            docs/forensics/audits/selected-xml-result-signals.json
            docs/forensics/audits/ollama-server.log
            docs/forensics/audits/ollama-tags.json
            docs/forensics/audits/ollama-smoke.json
            docs/forensics/audits/ollama-smoke.txt
            docs/forensics/audits/xml-selected-meaning-span-rehash-runs/**
