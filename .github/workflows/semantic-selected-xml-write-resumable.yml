name: Selected XML semantic write resumable

on:
  workflow_dispatch:
    inputs:
      limit_docs:
        description: "Optional selected XML document limit. Leave blank for all selected docs."
        required: false
        default: ""
      limit:
        description: "Optional scene/window limit. Leave blank for all windows."
        required: false
        default: ""
      batch_size:
        description: "Selected XML render paragraphs per semantic packet."
        required: false
        default: "1"
      batch_action:
        description: "How to run the selected XML semantic pipeline."
        required: false
        default: "sync_write"
        type: choice
        options:
          - "sync_write"
          - "prepare_batch"
          - "submit_batch"
          - "poll_batch"
          - "poll_import"
          - "import_results"
      batch_id:
        description: "Batch id for poll_batch or poll_import."
        required: false
        default: ""
      import_batch_results_path:
        description: "Existing batch results path for import_results."
        required: false
        default: ""
      provider:
        description: "Semantic provider. Use ollama_actions for free GitHub Actions compute."
        required: false
        default: "ollama_actions"
        type: choice
        options:
          - "ollama_actions"
          - "free_local"
          - "gemini_sync"
          - "openai_batch"
          - "openai_sync"
          - "anthropic_batch"
          - "anthropic_sync"
      model:
        description: "Model name. For ollama_actions: llama3.2:1b or llama3.2:3b."
        required: false
        default: "llama3.2:1b"
      full_run_confirm:
        description: "Required true for full selected XML runs with no limits."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      apply_migration_first:
        description: "Apply selected XML migrations before running."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      resume_existing:
        description: "Use durable Supabase checkpoint/resume state and skip completed task/window units."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      soft_stop_minutes:
        description: "Soft stop before GitHub's 6-hour job cutoff so artifacts and checkpoint summary can upload."
        required: false
        default: "330"
      max_task_retries:
        description: "Maximum retries for failed checkpointed task/window units."
        required: false
        default: "2"

permissions:
  contents: read

jobs:
  selected-xml-semantic-write:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      SEMANTIC_PROVIDER: ${{ inputs.provider }}
      SEMANTIC_MODEL: ${{ inputs.model }}
      VERTEX_MODEL: ${{ inputs.model }}

      OLLAMA_BASE_URL: "http://localhost:11434"
      OLLAMA_MODEL: ${{ inputs.model }}
      OLLAMA_NUM_CTX: "2048"
      OLLAMA_CONTEXT_CHARS: "4000"
      OLLAMA_TIMEOUT_MS: "300000"
      OLLAMA_KEEP_ALIVE: "5m"

      SELECTED_XML_MIGRATION_FILE: supabase/migrations/20260620010000_expand_selected_xml_semantic_runtime.sql
      SELECTED_XML_CHECKPOINT_MIGRATION_FILE: supabase/migrations/20260623000000_selected_xml_task_checkpoints.sql
      SELECTED_XML_SCRIPT: scripts/semantic/xml-selected-meaning-span-rehash.mjs

      SELECTED_XML_LIMIT_DOCS: ${{ inputs.limit_docs }}
      SELECTED_XML_LIMIT: ${{ inputs.limit }}
      SELECTED_XML_BATCH_SIZE: ${{ inputs.batch_size }}
      SELECTED_XML_BATCH_ACTION: ${{ inputs.batch_action }}
      SELECTED_XML_BATCH_ID: ${{ inputs.batch_id }}
      SELECTED_XML_IMPORT_BATCH_RESULTS_PATH: ${{ inputs.import_batch_results_path }}
      SELECTED_XML_FULL_RUN_CONFIRM: ${{ inputs.full_run_confirm }}

      SELECTED_XML_RESUME_EXISTING: ${{ inputs.resume_existing }}
      RESUME_EXISTING: ${{ inputs.resume_existing }}
      SELECTED_XML_SOFT_STOP_MINUTES: ${{ inputs.soft_stop_minutes }}
      SOFT_STOP_MINUTES: ${{ inputs.soft_stop_minutes }}
      SELECTED_XML_MAX_TASK_RETRIES: ${{ inputs.max_task_retries }}
      MAX_TASK_RETRIES: ${{ inputs.max_task_retries }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Prepare audit directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p docs/forensics/audits
          mkdir -p docs/forensics/audits/ai-timeout
          mkdir -p docs/forensics/audits/ai-empty
          mkdir -p docs/forensics/audits/ai-bad-json
          mkdir -p docs/forensics/audits/ai-connection
          mkdir -p docs/forensics/audits/db-errors
          mkdir -p docs/forensics/audits/xml-selected-meaning-span-rehash-runs

      - name: Validate selected XML script syntax
        shell: bash
        run: |
          set -euo pipefail

          test -f "$SELECTED_XML_SCRIPT"
          node --check "$SELECTED_XML_SCRIPT"

      - name: Verify Supabase configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF is not set."
            exit 1
          fi

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "SUPABASE_URL was not set; runtime may derive it from project ref."
          fi

          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is not set."
            exit 1
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set; migration step will fail if enabled."
          fi

      - name: Apply selected XML migrations
        if: ${{ inputs.apply_migration_first == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is required when apply_migration_first=true."
            exit 1
          fi

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF is required when apply_migration_first=true."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP"

          for migration_file in \
            "$SELECTED_XML_MIGRATION_FILE" \
            "$SELECTED_XML_CHECKPOINT_MIGRATION_FILE"
          do
            if [ ! -f "$migration_file" ]; then
              echo "::error::Migration file not found: $migration_file"
              exit 1
            fi

            echo "===== Applying migration: $migration_file ====="

            python3 - "$migration_file" > "$RUNNER_TEMP/migration_payload.json" <<'PY'
import json
import sys
from pathlib import Path

sql = Path(sys.argv[1]).read_text(encoding="utf-8")
print(json.dumps({"query": sql}))
PY

            http_code="$(
              curl -sS \
                -o "$RUNNER_TEMP/migration_response.json" \
                -w "%{http_code}" \
                -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
                -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                --data-binary "@$RUNNER_TEMP/migration_payload.json"
            )"

            echo "migration_http_code=$http_code"

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "::error::Migration failed for $migration_file"
              cat "$RUNNER_TEMP/migration_response.json" || true
              exit 1
            fi
          done

      - name: Install Ollama and pull model
        if: ${{ inputs.provider == 'ollama_actions' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Installing Ollama ====="
          curl -fsSL https://ollama.com/install.sh | sh

          echo "===== Starting ollama serve ====="
          mkdir -p docs/forensics/audits
          ollama serve > docs/forensics/audits/ollama-server.log 2>&1 &
          OLLAMA_PID="$!"
          echo "ollama PID: $OLLAMA_PID"

          echo "===== Waiting for ollama to be ready ====="
          READY="false"
          for i in $(seq 1 90); do
            if curl -sf "${OLLAMA_BASE_URL}/api/tags" > /dev/null 2>&1; then
              echo "ollama ready after ${i}s"
              READY="true"
              break
            fi
            sleep 1
          done

          if [ "$READY" != "true" ]; then
            echo "::error::Ollama did not become ready."
            tail -n 200 docs/forensics/audits/ollama-server.log || true
            exit 1
          fi

          echo "===== Pulling model: $OLLAMA_MODEL ====="
          ollama pull "$OLLAMA_MODEL"

          echo "===== Local model list ====="
          curl -sS "${OLLAMA_BASE_URL}/api/tags" | tee docs/forensics/audits/ollama-tags.json

          echo "===== Quick model smoke test ====="
          SMOKE_START_MS="$(node -e 'console.log(Date.now())')"

          RESPONSE="$(
            curl -sS \
              -X POST "${OLLAMA_BASE_URL}/api/generate" \
              -H "Content-Type: application/json" \
              --data-binary @- <<EOF
{"model":"${OLLAMA_MODEL}","prompt":"Reply with exactly OK.","stream":false,"keep_alive":"${OLLAMA_KEEP_ALIVE}","options":{"temperature":0,"num_ctx":256}}
EOF
          )"

          SMOKE_END_MS="$(node -e 'console.log(Date.now())')"
          SMOKE_MS="$((SMOKE_END_MS - SMOKE_START_MS))"

          MODEL_RESPONSE="$(
            node -e '
              const fs = require("fs");
              const raw = fs.readFileSync(0, "utf8");
              try {
                const parsed = JSON.parse(raw);
                process.stdout.write(String(parsed.response || ""));
              } catch {
                process.stdout.write("");
              }
            ' <<< "$RESPONSE"
          )"

          echo "Model response: ${MODEL_RESPONSE}"

          if echo "$MODEL_RESPONSE" | grep -q "OK"; then
            SMOKE_OK="true"
          else
            SMOKE_OK="false"
          fi

          SMOKE_MODEL="$OLLAMA_MODEL" \
          SMOKE_RESPONSE="$MODEL_RESPONSE" \
          SMOKE_OK="$SMOKE_OK" \
          SMOKE_MS="$SMOKE_MS" \
          node > docs/forensics/audits/ollama-smoke.json <<'NODE_SMOKE'
const data = {
  model: process.env.SMOKE_MODEL || "",
  smoke_ok: process.env.SMOKE_OK === "true",
  smoke_elapsed_ms: Number(process.env.SMOKE_MS || 0),
  response_preview: String(process.env.SMOKE_RESPONSE || "").slice(0, 200),
};
console.log(JSON.stringify(data, null, 2));
NODE_SMOKE

          if [ "$SMOKE_OK" != "true" ]; then
            echo "::error::Ollama smoke test failed."
            cat docs/forensics/audits/ollama-smoke.json || true
            tail -n 200 docs/forensics/audits/ollama-server.log || true
            exit 1
          fi

      - name: Run selected XML semantic write
        shell: bash
        run: |
          set -euo pipefail

          echo "===== RUN PARAMETERS ====="
          echo "batch_action=${SELECTED_XML_BATCH_ACTION}"
          echo "provider=${SEMANTIC_PROVIDER}"
          echo "model=${SEMANTIC_MODEL}"
          echo "full_run_confirm=${SELECTED_XML_FULL_RUN_CONFIRM}"
          echo "limit_docs=${SELECTED_XML_LIMIT_DOCS}"
          echo "limit=${SELECTED_XML_LIMIT}"
          echo "batch_size=${SELECTED_XML_BATCH_SIZE}"
          echo "resume_existing=${SELECTED_XML_RESUME_EXISTING}"
          echo "soft_stop_minutes=${SELECTED_XML_SOFT_STOP_MINUTES}"
          echo "max_task_retries=${SELECTED_XML_MAX_TASK_RETRIES}"

          if [ "${SELECTED_XML_FULL_RUN_CONFIRM}" != "true" ]; then
            if [ -z "${SELECTED_XML_LIMIT_DOCS}" ] && [ -z "${SELECTED_XML_LIMIT}" ]; then
              echo "::error::Refusing uncapped selected XML run unless full_run_confirm=true."
              exit 1
            fi
          fi

          if [ "${SEMANTIC_PROVIDER}" = "ollama_actions" ]; then
            if ! curl -sf "${OLLAMA_BASE_URL}/api/tags" > /dev/null 2>&1; then
              echo "::error::Ollama is not reachable before selected XML script."
              tail -n 200 docs/forensics/audits/ollama-server.log || true
              exit 1
            fi
          fi

          SELECTED_XML_LIMIT_DOCS="${SELECTED_XML_LIMIT_DOCS}" \
          SELECTED_XML_LIMIT="${SELECTED_XML_LIMIT}" \
          SELECTED_XML_BATCH_SIZE="${SELECTED_XML_BATCH_SIZE}" \
          SELECTED_XML_BATCH_ACTION="${SELECTED_XML_BATCH_ACTION}" \
          SELECTED_XML_BATCH_ID="${SELECTED_XML_BATCH_ID}" \
          SELECTED_XML_IMPORT_BATCH_RESULTS_PATH="${SELECTED_XML_IMPORT_BATCH_RESULTS_PATH}" \
          SELECTED_XML_FULL_RUN_CONFIRM="${SELECTED_XML_FULL_RUN_CONFIRM}" \
          SELECTED_XML_RESUME_EXISTING="${SELECTED_XML_RESUME_EXISTING}" \
          RESUME_EXISTING="${RESUME_EXISTING}" \
          SELECTED_XML_SOFT_STOP_MINUTES="${SELECTED_XML_SOFT_STOP_MINUTES}" \
          SOFT_STOP_MINUTES="${SOFT_STOP_MINUTES}" \
          SELECTED_XML_MAX_TASK_RETRIES="${SELECTED_XML_MAX_TASK_RETRIES}" \
          MAX_TASK_RETRIES="${MAX_TASK_RETRIES}" \
          node "$SELECTED_XML_SCRIPT"

      - name: Print compact run summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Latest run-summary.json ====="

          SUMMARY="$(
            find docs/forensics/audits/xml-selected-meaning-span-rehash-runs \
              -type f \
              -name run-summary.json \
              2>/dev/null \
              | sort \
              | tail -n 1 || true
          )"

          if [ -n "${SUMMARY:-}" ] && [ -f "$SUMMARY" ]; then
            echo "summary=$SUMMARY"
            node - "$SUMMARY" <<'NODE_SUMMARY'
const fs = require("fs");
const file = process.argv[2];
const data = JSON.parse(fs.readFileSync(file, "utf8"));
const picked = {
  run_id: data.run_id,
  provider: data.provider,
  canonical_provider: data.canonical_provider,
  provider_model: data.provider_model,
  write_mode: data.write_mode,
  no_ai: data.no_ai,
  db_adapter: data.db_adapter,
  management_api_hot_path: data.management_api_hot_path,
  resume_existing: data.resume_existing,
  soft_stop_minutes: data.soft_stop_minutes,
  soft_stop_triggered: data.soft_stop_triggered,
  completed_before_run: data.completed_before_run,
  skipped_due_to_checkpoint: data.skipped_due_to_checkpoint,
  completed_this_run: data.completed_this_run,
  remaining_after_run: data.remaining_after_run,
  semantic_windows_target: data.semantic_windows_target,
  semantic_windows_attempted: data.semantic_windows_attempted,
  semantic_windows: data.semantic_windows,
  meaning_spans: data.meaning_spans,
  total_meaning_spans: data.total_meaning_spans,
  task_ok: data.task_ok,
  task_empty: data.task_empty,
  task_failed: data.task_failed,
  task_counts: data.task_counts,
  failed: data.failed,
  last_error_type: data.last_error_type,
  last_error_message: data.last_error_message,
};
console.log(JSON.stringify(picked, null, 2));
NODE_SUMMARY
          else
            echo "No run-summary.json found."
          fi

      - name: Upload selected XML semantic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selected-xml-semantic-write-artifacts
          if-no-files-found: warn
          path: |
            docs/forensics/audits/ollama-smoke.json
            docs/forensics/audits/ollama-tags.json
            docs/forensics/audits/ollama-server.log
            docs/forensics/audits/ai-timeout/**
            docs/forensics/audits/ai-empty/**
            docs/forensics/audits/ai-bad-json/**
            docs/forensics/audits/ai-connection/**
            docs/forensics/audits/db-errors/**
            docs/forensics/audits/xml-selected-meaning-span-rehash-runs/**
