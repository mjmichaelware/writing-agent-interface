name: Selected XML semantic write

on:
  workflow_dispatch:
    inputs:
      limit_docs:
        description: "Optional selected XML document limit. Leave blank for all selected docs."
        required: false
        default: ""
      limit:
        description: "Optional scene/window limit. Leave blank for all windows."
        required: false
        default: ""
      batch_size:
        description: "Selected XML render paragraphs per semantic packet."
        required: false
        default: "1"
      batch_action:
        description: "How to run the selected XML semantic pipeline."
        required: false
        default: "prepare_batch"
        type: choice
        options:
          - "prepare_batch"
          - "submit_batch"
          - "sync_write"
          - "poll_batch"
          - "poll_import"
          - "import_results"
      batch_id:
        description: "Batch id for poll_batch or poll_import."
        required: false
        default: ""
      import_batch_results_path:
        description: "Existing batch results path for import_results."
        required: false
        default: ""
      provider:
        description: "Semantic provider adapter."
        required: false
        default: "openai_batch"
        type: choice
        options:
          - "openai_batch"
          - "openai_sync"
          - "anthropic_batch"
          - "anthropic_sync"
          - "gemini_sync"
      model:
        description: "Provider model name."
        required: false
        default: "gpt-4.1-mini"
      full_run_confirm:
        description: "Required true for full selected XML runs with no limits."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      apply_migration_first:
        description: "Apply selected XML meaning-span migration before running."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  selected-xml-semantic-write:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SEMANTIC_PROVIDER: ${{ inputs.provider }}
      SEMANTIC_MODEL: ${{ inputs.model }}
      VERTEX_MODEL: ${{ inputs.model }}
      SELECTED_XML_MIGRATION_FILE: supabase/migrations/20260620010000_expand_selected_xml_semantic_runtime.sql
      SELECTED_XML_SCRIPT: scripts/semantic/xml-selected-meaning-span-rehash.mjs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies when needed
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Verify workflow env and selected XML script
        shell: bash
        run: |
          set -euo pipefail

          test -n "$SEMANTIC_PROVIDER"
          test -n "$SEMANTIC_MODEL"
          test -n "${{ inputs.batch_action }}"

          case "${{ inputs.batch_action }}" in
            sync_write)
              case "$SEMANTIC_PROVIDER" in
                *_sync) ;;
                *) echo "sync_write requires a *_sync provider"; exit 1 ;;
              esac
              test -n "$SUPABASE_ACCESS_TOKEN"
              test -n "$SUPABASE_PROJECT_REF"
              ;;
            prepare_batch)
              case "$SEMANTIC_PROVIDER" in
                *_batch) ;;
                *) echo "prepare_batch requires a *_batch provider"; exit 1 ;;
              esac
              ;;
            submit_batch|poll_batch|poll_import|import_results)
              case "$SEMANTIC_PROVIDER" in
                *_batch) ;;
                *) echo "${{ inputs.batch_action }} requires a *_batch provider"; exit 1 ;;
              esac
              ;;
            *)
              echo "Unsupported batch_action: ${{ inputs.batch_action }}"
              exit 1
              ;;
          esac

          case "${{ inputs.batch_action }}" in
            sync_write|poll_import|import_results)
              test -n "$SUPABASE_ACCESS_TOKEN"
              test -n "$SUPABASE_PROJECT_REF"
              ;;
          esac

          case "${{ inputs.batch_action }}" in
            submit_batch|poll_batch|poll_import|sync_write)
              case "$SEMANTIC_PROVIDER" in
                openai_*) test -n "$OPENAI_API_KEY" ;;
                anthropic_*) test -n "$ANTHROPIC_API_KEY" ;;
                gemini_*) test -n "$GOOGLE_API_KEY"; test -n "$VERTEX_MODEL" ;;
                *) echo "Unsupported provider: $SEMANTIC_PROVIDER"; exit 1 ;;
              esac
              ;;
          esac

          if [ "${{ inputs.batch_action }}" = "poll_batch" ] || [ "${{ inputs.batch_action }}" = "poll_import" ]; then
            test -n "${{ inputs.batch_id }}"
          fi

          if [ "${{ inputs.batch_action }}" = "import_results" ]; then
            test -n "${{ inputs.import_batch_results_path }}"
          fi

          test -f "$SELECTED_XML_SCRIPT"
          test -f "$SELECTED_XML_MIGRATION_FILE"

          node --check "$SELECTED_XML_SCRIPT"

          echo "project_ref=$SUPABASE_PROJECT_REF"
          echo "provider=$SEMANTIC_PROVIDER"
          echo "model=$SEMANTIC_MODEL"
          echo "script=$SELECTED_XML_SCRIPT"
          echo "migration=$SELECTED_XML_MIGRATION_FILE"

      - name: Verify selected XML source files are present in repository checkout
        shell: bash
        run: |
          set -euo pipefail

          echo "===== selected XML source discovery ====="
          find reports docs public scripts supabase -maxdepth 6 \
            \( -name 'xml_starred_hash_truth.txt' -o -name 'materialized_ooxml_manifest.json' -o -name 'document.xml' \) \
            -print 2>/dev/null | sort | sed -n '1,200p'

          echo
          echo "===== script selected source references ====="
          grep -n "xml_starred_hash_truth\|materialized_ooxml\|selected_xml\|document.xml" "$SELECTED_XML_SCRIPT" | sed -n '1,160p'

      - name: Verify Supabase connectivity
        if: ${{ inputs.batch_action == 'sync_write' || inputs.batch_action == 'poll_import' || inputs.batch_action == 'import_results' }}
        shell: bash
        run: |
          set -euo pipefail

          http_code="$(
            curl -sS \
              -o /tmp/supabase_now.json \
              -w "%{http_code}" \
              -X POST \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
              --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"query":"select now() as ts, count(*) as run_count from public.semantic_runs"}'
          )"

          cat /tmp/supabase_now.json
          echo
          echo "http_code=$http_code"

          case "$http_code" in
            200|201) echo "Supabase Management API reachable" ;;
            401) echo "::error::SUPABASE_ACCESS_TOKEN rejected — generate a new PAT at supabase.com/dashboard/account/tokens"; exit 1 ;;
            403) echo "::error::SUPABASE_ACCESS_TOKEN lacks permission for this project"; exit 1 ;;
            *) echo "::error::Supabase returned unexpected http_code=$http_code"; exit 1 ;;
          esac

      - name: Apply selected XML meaning-span migration
        if: ${{ inputs.apply_migration_first == 'true' && (inputs.batch_action == 'sync_write' || inputs.batch_action == 'poll_import' || inputs.batch_action == 'import_results') }}
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY' > /tmp/selected_xml_meaning_span_migration.json
          import json
          from pathlib import Path

          sql = Path("supabase/migrations/20260620010000_expand_selected_xml_semantic_runtime.sql").read_text(encoding="utf-8")
          print(json.dumps({"query": sql}))
          PY

          http_code="$(
            curl -sS \
              -o /tmp/selected_xml_meaning_span_migration_response.json \
              -w "%{http_code}" \
              -X POST \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
              --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              --data-binary @/tmp/selected_xml_meaning_span_migration.json
          )"

          cat /tmp/selected_xml_meaning_span_migration_response.json
          echo
          echo "http_code=$http_code"

          case "$http_code" in
            200|201|202) ;;
            *) exit 1 ;;
          esac

      - name: No-AI canary for selected XML source driver
        if: ${{ inputs.batch_action == 'sync_write' || inputs.batch_action == 'prepare_batch' || inputs.batch_action == 'submit_batch' }}
        shell: bash
        run: |
          set -euo pipefail

          CANARY_PROVIDER="${{ inputs.provider }}"
          CANARY_PROVIDER="${CANARY_PROVIDER/%_batch/_sync}"
          node "$SELECTED_XML_SCRIPT" --no-ai --limit-docs=1 --limit=1 --batch-size=1 "--provider=$CANARY_PROVIDER"

      - name: Run selected XML semantic write
        shell: bash
        run: |
          set -euo pipefail

          echo "batch_action=${{ inputs.batch_action }}"
          echo "batch_id=${{ inputs.batch_id }}"
          echo "import_batch_results_path=${{ inputs.import_batch_results_path }}"
          echo "provider=${{ inputs.provider }}"
          echo "limit_docs=${{ inputs.limit_docs }}"
          echo "limit=${{ inputs.limit }}"
          echo "batch_size=${{ inputs.batch_size }}"
          echo "model=${{ inputs.model }}"
          echo "full_run_confirm=${{ inputs.full_run_confirm }}"

          REQUIRES_CONFIRM=false
          case "${{ inputs.batch_action }}" in
            sync_write|submit_batch|poll_import|import_results) REQUIRES_CONFIRM=true ;;
          esac

          if [ "$REQUIRES_CONFIRM" = true ] && [ -z "${{ inputs.limit_docs }}" ] && [ -z "${{ inputs.limit }}" ] && [ "${{ inputs.full_run_confirm }}" != "true" ]; then
            echo "Refusing full run without full_run_confirm=true"
            exit 1
          fi

          BASE_ARGS=("--batch-size=${{ inputs.batch_size }}" "--provider=${{ inputs.provider }}")

          if [ -n "${{ inputs.limit_docs }}" ]; then
            BASE_ARGS+=("--limit-docs=${{ inputs.limit_docs }}")
          fi

          if [ -n "${{ inputs.limit }}" ]; then
            BASE_ARGS+=("--limit=${{ inputs.limit }}")
          fi

          if [ "${{ inputs.full_run_confirm }}" = "true" ]; then
            BASE_ARGS+=("--full-run-confirm")
          fi

          case "${{ inputs.batch_action }}" in
            sync_write)
              ARGS=(--write "${BASE_ARGS[@]}")
              printf 'args=%s\n' "${ARGS[*]}"
              echo "node $SELECTED_XML_SCRIPT ${ARGS[*]}"
              node "$SELECTED_XML_SCRIPT" "${ARGS[@]}"
              ;;
            prepare_batch)
              ARGS=("${BASE_ARGS[@]}")
              printf 'args=%s\n' "${ARGS[*]}"
              echo "node $SELECTED_XML_SCRIPT ${ARGS[*]}"
              node "$SELECTED_XML_SCRIPT" "${ARGS[@]}"
              ;;
            submit_batch)
              ARGS=("${BASE_ARGS[@]}" --submit-batch)
              printf 'args=%s\n' "${ARGS[*]}"
              echo "node $SELECTED_XML_SCRIPT ${ARGS[*]}"
              node "$SELECTED_XML_SCRIPT" "${ARGS[@]}"
              ;;
            poll_batch)
              ARGS=("${BASE_ARGS[@]}" "--poll-batch=${{ inputs.batch_id }}")
              printf 'args=%s\n' "${ARGS[*]}"
              echo "node $SELECTED_XML_SCRIPT ${ARGS[*]}"
              node "$SELECTED_XML_SCRIPT" "${ARGS[@]}"
              ;;
            poll_import)
              POLL_ARGS=("${BASE_ARGS[@]}" "--poll-batch=${{ inputs.batch_id }}")
              printf 'poll_args=%s\n' "${POLL_ARGS[*]}"
              echo "node $SELECTED_XML_SCRIPT ${POLL_ARGS[*]}"
              node "$SELECTED_XML_SCRIPT" "${POLL_ARGS[@]}"

              OUTPUT_PATH="$(find docs/forensics/audits/xml-selected-meaning-span-rehash-runs -path "*batch-output-${{ inputs.batch_id }}.jsonl" | sort | tail -n 1)"
              test -n "$OUTPUT_PATH"
              test -f "$OUTPUT_PATH"
              echo "resolved_import_output=$OUTPUT_PATH"

              IMPORT_ARGS=(--write "${BASE_ARGS[@]}" "--import-batch-results=$OUTPUT_PATH")
              printf 'import_args=%s\n' "${IMPORT_ARGS[*]}"
              echo "node $SELECTED_XML_SCRIPT ${IMPORT_ARGS[*]}"
              node "$SELECTED_XML_SCRIPT" "${IMPORT_ARGS[@]}"
              ;;
            import_results)
              ARGS=(--write "${BASE_ARGS[@]}" "--import-batch-results=${{ inputs.import_batch_results_path }}")
              printf 'args=%s\n' "${ARGS[*]}"
              echo "node $SELECTED_XML_SCRIPT ${ARGS[*]}"
              node "$SELECTED_XML_SCRIPT" "${ARGS[@]}"
              ;;
            *)
              echo "Unsupported batch_action: ${{ inputs.batch_action }}"
              exit 1
              ;;
          esac

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "## Selected XML Semantic Write" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Provider:** \`${{ inputs.provider }}\`  **Model:** \`${{ inputs.model }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Action:** \`${{ inputs.batch_action }}\`  **full_run_confirm:** \`${{ inputs.full_run_confirm }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **limit_docs:** \`${{ inputs.limit_docs || 'all' }}\`  **limit:** \`${{ inputs.limit || 'all' }}\`  **batch_size:** \`${{ inputs.batch_size }}\`" >> "$GITHUB_STEP_SUMMARY"
          if curl -sS \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"query":"select id, status, provider, model, started_at, completed_at, error from public.semantic_runs order by started_at desc limit 5"}' \
            -o /tmp/runs_summary.json -w "" 2>/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Recent semantic_runs" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/runs_summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload selected XML semantic run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selected-xml-semantic-write-artifacts
          path: |
            docs/forensics/audits/xml-selected-meaning-span-rehash-runs/**
            docs/forensics/audits/semantic-selected-xml-*.log
          if-no-files-found: warn
