name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase-edge.yml"

jobs:
  deploy-edge-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        run: supabase db push

      - name: Set Edge Function secrets
        run: |
          supabase secrets set SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          supabase secrets set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy create-upload-url --project-ref "$PROJECT_ID"
          supabase functions deploy register-uploaded-artifact --project-ref "$PROJECT_ID"
          supabase functions deploy verify-artifact-hash --project-ref "$PROJECT_ID"
          supabase functions deploy enqueue-enrichment --project-ref "$PROJECT_ID"
          supabase functions deploy process-enrichment-batch --project-ref "$PROJECT_ID"
